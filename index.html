<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK Lanches | Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-24">
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 text-center">
        <h1 class="text-2xl font-bold text-red-600">LK Lanches</h1>
        <button onclick="rastrear()" class="text-xs text-gray-500 underline mt-1">Acompanhar Pedido</button>
    </header>

    <div id="status-loja" class="p-1 text-center text-white text-xs font-bold hidden"></div>

    <main id="menu" class="p-4 max-w-xl mx-auto space-y-4">
        <p class="text-center text-gray-400">Carregando cardápio...</p>
    </main>

    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-500">Total com entrega</p>
                <p id="total-cart" class="text-lg font-bold">R$ 0,00</p>
            </div>
            <button onclick="fecharPedido()" class="bg-red-600 text-white px-8 py-3 rounded-xl font-bold">Fechar Pedido</button>
        </div>
    </div>

    <script>
        const _URL = "https://ctxmprogrnsretxlmogf.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0eG1wcm9ncm5zcmV0eGxtb2dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0OTYyOTQsImV4cCI6MjA4ODA3MjI5NH0.AivDE28NG4X5-C6vbn8bkyByVcSoLhL9oOwPP5pPWII";
        const _supabase = window.supabase.createClient(_URL, _KEY);

        let carrinho = [];
        let taxa = 0;

        async function init() {
            const { data: config } = await _supabase.from('configuracoes').select('*').single();
            const { data: produtos } = await _supabase.from('produtos').select('*').eq('disponivel', true);
            
            taxa = config.taxa_entrega;
            const banner = document.getElementById('status-loja');
            banner.innerText = config.loja_aberta ? "LOJA ABERTA" : "LOJA FECHADA";
            banner.className = `p-1 text-center text-white text-xs font-bold block ${config.loja_aberta ? 'bg-green-500' : 'bg-red-500'}`;

            document.getElementById('menu').innerHTML = produtos.map(p => `
                <div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between">
                    <div class="flex-1">
                        <h3 class="font-bold">${p.nome}</h3>
                        <p class="text-xs text-gray-500">${p.descricao}</p>
                        <p class="text-red-600 font-bold mt-2">R$ ${Number(p.preco).toFixed(2)}</p>
                    </div>
                    <div class="ml-4 text-right">
                        <img src="${p.imagem_url}" class="w-16 h-16 rounded-lg object-cover mb-2">
                        <button onclick="add('${p.nome}', ${p.preco})" class="bg-red-50 text-red-600 p-2 rounded-lg"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function add(nome, preco) {
            carrinho.push({nome, preco});
            const total = carrinho.reduce((a, b) => a + b.preco, 0) + taxa;
            document.getElementById('cart-bar').classList.remove('hidden');
            document.getElementById('total-cart').innerText = `R$ ${total.toFixed(2)}`;
        }

        async function fecharPedido() {
            const nome = prompt("Seu nome:");
            const endereco = prompt("Endereço completo:");
            if(!nome || !endereco) return;

            const total = carrinho.reduce((a, b) => a + b.preco, 0) + taxa;
            const itens = carrinho.map(i => i.nome).join(", ");

            const { error } = await _supabase.from('pedidos').insert([{ cliente: nome, itens, total, endereco }]);
            
            if(!error) {
                alert("Pedido Enviado!");
                window.open(`https://wa.me/558393884472?text=Novo Pedido: ${itens}%0ATotal: R$ ${total.toFixed(2)}%0AEndereço: ${endereco}`);
                location.reload();
            }
        }

        async function rastrear() {
            const nome = prompt("Digite seu nome:");
            const { data } = await _supabase.from('pedidos').select('status').eq('cliente', nome).order('id', {ascending: false}).limit(1);
            if(data.length) alert("Status do seu pedido: " + data[0].status);
            else alert("Pedido não encontrado.");
        }

        init();
    </script>
</body>
</html>
