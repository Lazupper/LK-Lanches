<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK Lanches | Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .category-scroll::-webkit-scrollbar { display: none; }
        .bg-ifood { background-color: #ea1d2c; }
        .text-ifood { color: #ea1d2c; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <!-- Header -->
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-ifood">LK Lanches</h1>
            <button onclick="abrirRastreio()" class="text-gray-600 font-medium">
                <i class="fas fa-search-location"></i> Rastrear
            </button>
        </div>
    </header>

    <!-- Banner Loja Aberta/Fechada -->
    <div id="status-loja" class="hidden text-center p-2 text-white font-bold"></div>

    <!-- Categorias -->
    <div class="p-4 overflow-x-auto flex gap-4 category-scroll max-w-xl mx-auto">
        <button onclick="filtrar('Todos')" class="bg-white px-6 py-2 rounded-full shadow-sm border">Todos</button>
        <button onclick="filtrar('Lanches')" class="bg-white px-6 py-2 rounded-full shadow-sm border">🍔 Lanches</button>
        <button onclick="filtrar('Bebidas')" class="bg-white px-6 py-2 rounded-full shadow-sm border">🥤 Bebidas</button>
    </div>

    <!-- Cardápio -->
    <main id="menu" class="p-4 max-w-xl mx-auto space-y-4">
        <p class="text-center text-gray-500">Carregando cardápio...</p>
    </main>

    <!-- Barra do Carrinho -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-500">Total com frete</p>
                <p id="total-text" class="text-lg font-bold">R$ 0,00</p>
            </div>
            <button onclick="finalizarPedido()" class="bg-ifood text-white px-8 py-3 rounded-xl font-bold">
                Fechar Pedido
            </button>
        </div>
    </div>

  <script>
    // 1. CONFIGURAÇÃO (Coloque suas chaves aqui)
    const _URL = "https://ctxmprogrnsretxlmogf.supabase.co";
    const _KEY = "sb_publishable_lTYnZuQKccyFvNmfSMgDcw_wfIBa-YG";

    // 2. INICIALIZAÇÃO (O segredo está aqui: _supabase com underline)
    const _supabase = window.supabase.createClient(_URL, _KEY);

    // 3. FUNÇÃO PARA MUDAR DE ABA
    function aba(nome) {
        document.getElementById('aba-pedidos').classList.add('hidden');
        document.getElementById('aba-cardapio').classList.add('hidden');
        document.getElementById('aba-config').classList.add('hidden');
        document.getElementById('aba-' + nome).classList.remove('hidden');
    }

    // 4. CARREGAR PEDIDOS (Corrigido para _supabase)
    async function carregarPedidos() {
        try {
            const { data, error } = await _supabase.from('pedidos').select('*').order('id', {ascending: false});
            if (error) throw error;

            document.getElementById('lista-pedidos').innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded shadow border-l-4 ${p.status === 'Pendente' ? 'border-yellow-400' : 'border-green-500'}">
                    <div class="flex justify-between"><strong>${p.cliente}</strong> <span>R$ ${Number(p.total).toFixed(2)}</span></div>
                    <p class="text-sm text-gray-600">${p.itens}</p>
                    <div class="flex gap-2 mt-3">
                        <button onclick="statusPedido(${p.id}, 'Preparando')" class="bg-blue-100 text-blue-700 px-2 rounded text-xs">Preparando</button>
                        <button onclick="statusPedido(${p.id}, 'Saiu')" class="bg-orange-100 text-orange-700 px-2 rounded text-xs">Saiu</button>
                        <button onclick="statusPedido(${p.id}, 'Entregue')" class="bg-green-100 text-green-700 px-2 rounded text-xs">Concluído</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error("Erro ao carregar pedidos:", err.message);
        }
    }

    // 5. ADICIONAR PRODUTO (Corrigido para _supabase)
    async function addProduto() {
        const nome = document.getElementById('p-nome').value;
        const preco = document.getElementById('p-preco').value;
        const imagem_url = document.getElementById('p-img').value;
        const categoria = document.getElementById('p-cat').value;

        const { error } = await _supabase.from('produtos').insert([{nome, preco, imagem_url, categoria}]);
        
        if (error) alert("Erro ao salvar: " + error.message);
        else location.reload();
    }

    // 6. ATUALIZAR STATUS (Corrigido para _supabase)
    async function statusPedido(id, s) {
        await _supabase.from('pedidos').update({status: s}).eq('id', id);
        carregarPedidos();
    }

    // 7. SALVAR CONFIGURAÇÕES (Corrigido para _supabase)
    async function saveConfig() {
        const taxa = document.getElementById('c-taxa').value;
        const aberta = document.getElementById('c-aberta').value;
        await _supabase.from('configuracoes').update({taxa_entrega: taxa, loja_aberta: aberta}).eq('id', 1);
        alert("Atualizado!");
    }

    // 8. EXECUÇÃO INICIAL
    setInterval(carregarPedidos, 5000); // Atualiza a cada 5 segundos
    carregarPedidos();
</script>
</body>
</html>
