<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LK Lanches | Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .category-scroll::-webkit-scrollbar { display: none; }
        .bg-ifood { background-color: #ea1d2c; }
        .text-ifood { color: #ea1d2c; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <!-- Header -->
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-ifood">LK Lanches</h1>
            <button onclick="abrirRastreio()" class="text-gray-600 font-medium">
                <i class="fas fa-search-location"></i> Rastrear
            </button>
        </div>
    </header>

    <!-- Banner Loja Aberta/Fechada -->
    <div id="status-loja" class="hidden text-center p-2 text-white font-bold"></div>

    <!-- Categorias -->
    <div class="p-4 overflow-x-auto flex gap-4 category-scroll max-w-xl mx-auto">
        <button onclick="filtrar('Todos')" class="bg-white px-6 py-2 rounded-full shadow-sm border">Todos</button>
        <button onclick="filtrar('Lanches')" class="bg-white px-6 py-2 rounded-full shadow-sm border">🍔 Lanches</button>
        <button onclick="filtrar('Bebidas')" class="bg-white px-6 py-2 rounded-full shadow-sm border">🥤 Bebidas</button>
    </div>

    <!-- Cardápio -->
    <main id="menu" class="p-4 max-w-xl mx-auto space-y-4">
        <p class="text-center text-gray-500">Carregando cardápio...</p>
    </main>

    <!-- Barra do Carrinho -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden shadow-2xl">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-500">Total com frete</p>
                <p id="total-text" class="text-lg font-bold">R$ 0,00</p>
            </div>
            <button onclick="finalizarPedido()" class="bg-ifood text-white px-8 py-3 rounded-xl font-bold">
                Fechar Pedido
            </button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const _URL = "https://ctxmprogrnsretxlmogf.supabase.co";
        const _KEY = "sb_publishable_lTYnZuQKccyFvNmfSMgDcw_wfIBa-YG";
       const _supabase = window.supabase.createClient(_URL, _KEY); 

        let carrinho = [];
        let taxaEntrega = 0;
        let produtosBD = [];

        async function init() {
            const { data: config } = await supabase.from('configuracoes').select('*').single();
            const { data: produtos } = await supabase.from('produtos').select('*').eq('disponivel', true);
            
            taxaEntrega = config.taxa_entrega;
            produtosBD = produtos;

            const banner = document.getElementById('status-loja');
            banner.innerText = config.loja_aberta ? "LOJA ABERTA" : "LOJA FECHADA";
            banner.className = config.loja_aberta ? "bg-green-500 block" : "bg-red-500 block";
            
            renderMenu(produtos);
        }

        function renderMenu(lista) {
            const menu = document.getElementById('menu');
            menu.innerHTML = lista.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800">${p.nome}</h3>
                        <p class="text-sm text-gray-500 line-clamp-2">${p.descricao}</p>
                        <p class="text-ifood font-bold mt-2">R$ ${p.preco.toFixed(2)}</p>
                    </div>
                    <div class="ml-4 text-right">
                        <img src="${p.imagem_url}" class="w-20 h-20 rounded-xl object-cover mb-2">
                        <button onclick="addCarrinho('${p.nome}', ${p.preco})" class="bg-red-50 text-ifood p-2 rounded-lg font-bold">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addCarrinho(nome, preco) {
            carrinho.push({nome, preco});
            const total = carrinho.reduce((a, b) => a + b.preco, 0) + taxaEntrega;
            document.getElementById('cart-bar').classList.remove('hidden');
            document.getElementById('total-text').innerText = `R$ ${total.toFixed(2)}`;
        }

        async function finalizarPedido() {
            const nomeCli = prompt("Qual seu nome?");
            const endCli = prompt("Endereço completo:");
            if(!nomeCli || !endCli) return;

            const total = carrinho.reduce((a, b) => a + b.preco, 0) + taxaEntrega;
            const itensTxt = carrinho.map(i => i.nome).join(", ");

            const { data, error } = await supabase.from('pedidos').insert([
                { cliente: nomeCli, itens: itensTxt, total: total, endereco: endCli }
            ]);

            if(!error) {
                alert("Pedido enviado para a LK Lanches!");
                window.open(`https://wa.me/55839388-4472?text=Novo Pedido: ${itensTxt}%0AEndereço: ${endCli}`);
                location.reload();
            }
        }

        async function abrirRastreio() {
            const nome = prompt("Digite seu nome para rastrear:");
            if(!nome) return;
            const { data } = await supabase.from('pedidos').select('status').eq('cliente', nome).order('id', {ascending:false}).limit(1);
            if(data.length) alert("Status da LK Lanches: " + data[0].status);
            else alert("Pedido não encontrado.");
        }

        function filtrar(cat) {
            if(cat === 'Todos') renderMenu(produtosBD);
            else renderMenu(produtosBD.filter(p => p.categoria === cat));
        }

        init();
    </script>
</body>
</html>
